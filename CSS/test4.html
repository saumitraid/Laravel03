<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS-4</title>
    <style type="text/css">
        /* Id selector */
        #dv1{
            width: 800px;
            height: 250px;
            border: 1px solid dodgerblue;
        }
        #dv2{
            width: 300px;
            height: 200px;
            background-color: yellowgreen;
        }
        /* Class Selector */
        .mydv1{
            width: 900px;
            height: 400px;
            border: 2px solid #000;
        }
        .bg-red{
            background-color: rgb(255, 187, 187);
        }
    </style>
</head>
<body>
    <div id="dv1">
        <div id="dv2">
            <p>
                Lorem ipsum, dolor sit amet consectetur adipisicing elit. Veritatis est, voluptatibus dolor explicabo dolore incidunt sit modi distinctio. Ipsa sequi officiis impedit culpa at iusto!
            </p>
        </div>
    </div>
    <div id="dv2">

    </div>
    <div class="mydv1 bg-red">

    </div>
</body>
</html>
